# Optional: Deploy ADF to Azure when adf_publish branch is updated
# Requires secrets: AZURE_CREDENTIALS, ADF_RESOURCE_GROUP
# Configure in ADF: Git integration -> Publish branch = adf_publish

name: Deploy ADF

on:
  push:
    branches: [adf_publish]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy ADF ARM Template
        run: |
          az deployment group create \
            --resource-group ${{ secrets.ADF_RESOURCE_GROUP }} \
            --template-file ARMTemplateForFactory.json \
            --parameters @ARMTemplateParametersForFactory.json
        continue-on-error: true  # Remove when secrets are configured
